{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{block "title" .}}whoson{{end}}</title>
<style>
:root {
  --bg:             #07090e;
  --bg-panel:       #0b0f18;
  --bg-card:        #0e1520;
  --surface:        #131d2c;
  --surface-hover:  #18243a;
  --border:         #1c2d42;
  --border-bright:  #2a4060;
  --text:           #c2d4e2;
  --text-muted:     #6e8aa0;
  --text-dim:       #304555;
  --accent:         #e07a30;
  --accent-glow:    rgba(224,122,48,.12);
  --green:          #1cc76a;
  --green-bg:       #081a10;
  --green-border:   #0c3020;
  --red:            #d94f4f;
  --red-bg:         #190909;
  --red-border:     #3d1212;
  --blue:           #3a92d4;
  --blue-bg:        #091422;
  --blue-border:    #0e2d48;
  --purple:         #8f72d4;
  --purple-bg:      #100d22;
  --purple-border:  #261842;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "SF Mono", "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Loader ───────────────────────────────────────────── */
#loader {
  height: 1px;
  background: var(--accent);
  position: fixed;
  top: 0; left: 0;
  width: 0;
  z-index: 9999;
}
#loader.active { animation: loader-bar 1.4s ease infinite; }
@keyframes loader-bar {
  0%   { left: 0;    width: 0; }
  30%  { left: 0;    width: 60%; }
  70%  { left: 40%;  width: 60%; }
  100% { left: 100%; width: 0; }
}

/* ── Navbar ───────────────────────────────────────────── */
.navbar {
  height: 44px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  gap: 1.25rem;
  position: sticky;
  top: 0;
  z-index: 100;
}

.brand {
  font-size: .8125rem;
  font-weight: 700;
  letter-spacing: .01em;
  color: var(--text);
  user-select: none;
}

.nav-divider { width: 1px; height: 14px; background: var(--border); }

.nav-stat {
  font-size: .625rem;
  color: var(--text-dim);
  letter-spacing: .08em;
  text-transform: uppercase;
}
.nav-stat strong { color: var(--text-muted); font-weight: 600; }

.nav-right { margin-left: auto; display: flex; align-items: center; gap: .625rem; }

/* ── Buttons ──────────────────────────────────────────── */
button {
  font-family: inherit;
  padding: .3rem .65rem;
  font-size: .625rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  border-radius: 2px;
  cursor: pointer;
  transition: background .1s, border-color .1s, color .1s;
  white-space: nowrap;
}
button:disabled { opacity: .3; cursor: default; }

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover:not(:disabled) {
  background: var(--surface);
  color: var(--text);
  border-color: var(--border-bright);
}
.btn-ghost.btn-on {
  background: var(--accent-glow);
  color: var(--accent);
  border-color: rgba(224,122,48,.4);
}
.btn-ghost.btn-on:hover:not(:disabled) {
  background: var(--accent-glow);
  color: var(--accent);
}

.btn-block   { background: transparent; color: var(--red);   border: 1px solid var(--red-border); }
.btn-unblock { background: transparent; color: var(--green); border: 1px solid var(--green-border); }
.btn-pending { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }

.btn-block:hover:not(:disabled)   { background: var(--red-bg); }
.btn-unblock:hover:not(:disabled) { background: var(--green-bg); }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; animation: spin .7s linear infinite; }

/* ── Layout ───────────────────────────────────────────── */
.content {
  padding: 1.25rem 1.5rem 2rem;
  max-width: 1600px;
  margin: 0 auto;
}

/* ── Error banner ─────────────────────────────────────── */
#error {
  display: none;
  background: var(--red-bg);
  color: var(--red);
  border: 1px solid var(--red-border);
  padding: .5rem 1rem;
  font-size: .6875rem;
  letter-spacing: .04em;
  margin-bottom: 1rem;
}

/* ── Stat cards ───────────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .625rem;
  margin-bottom: 1.125rem;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: .875rem 1rem .8rem;
  position: relative;
  overflow: hidden;
}
.stat-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
}
.stat-card.s-total::after   { background: var(--accent); }
.stat-card.s-online::after  { background: var(--green); }
.stat-card.s-offline::after { background: var(--border-bright); }
.stat-card.s-blocked::after { background: var(--red); }

.stat-label {
  font-size: .5625rem;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: .35rem;
}
.stat-value {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -.02em;
  line-height: 1;
}
.stat-card.s-total   .stat-value { color: var(--accent); }
.stat-card.s-online  .stat-value { color: var(--green); }
.stat-card.s-offline .stat-value { color: var(--text-muted); }
.stat-card.s-blocked .stat-value { color: var(--red); }

/* ── Filter bar ───────────────────────────────────────── */
.filter-bar {
  display: flex;
  align-items: center;
  gap: .375rem;
  margin-bottom: 1rem;
}

.filter-btn {
  font-family: inherit;
  padding: .3rem .65rem;
  font-size: .5875rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  border-radius: 2px;
  cursor: pointer;
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--border);
  transition: all .1s;
}
.filter-btn:hover { color: var(--text-muted); border-color: var(--border-bright); }
.filter-btn.active {
  background: var(--surface);
  color: var(--text);
  border-color: var(--border-bright);
}

.search-wrap {
  margin-left: auto;
  position: relative;
  display: flex;
  align-items: center;
}
.search-icon {
  position: absolute;
  left: .6rem;
  color: var(--text-dim);
  font-size: .75rem;
  pointer-events: none;
  line-height: 1;
}
.search-input {
  font-family: inherit;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: .3rem .65rem .3rem 1.75rem;
  font-size: .6875rem;
  width: 220px;
  outline: none;
  border-radius: 2px;
  letter-spacing: .02em;
}
.search-input::placeholder { color: var(--text-dim); }
.search-input:focus { border-color: var(--border-bright); }

/* ── Device grid ──────────────────────────────────────── */
.device-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: .625rem;
}

/* ── Device card ──────────────────────────────────────── */
.device-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  transition: border-color .15s, background .15s;
}
.device-card:hover { border-color: var(--border-bright); background: var(--surface); }
.device-card.dc-offline { opacity: .55; }
.device-card.dc-offline:hover { opacity: .8; }
.device-card.dc-pending { opacity: .45; pointer-events: none; }

/* top accent bar — blocked overrides online */
.card-stripe {
  height: 1px;
  width: 100%;
  flex-shrink: 0;
}
.device-card.dc-online  .card-stripe { background: var(--green); }
.device-card.dc-offline .card-stripe { background: var(--border); }
.device-card.dc-online.dc-blocked  .card-stripe { background: var(--red); }
.device-card.dc-offline.dc-blocked .card-stripe { background: var(--red); }

.card-body {
  padding: .6rem .875rem .55rem;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: .28rem;
}

.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .5rem;
}

/* status pill */
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: .3rem;
  font-size: .5625rem;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
}
.status-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dc-online  .status-pill { color: var(--green); }
.dc-online  .status-dot  { background: var(--green); box-shadow: 0 0 4px var(--green); }
.dc-offline .status-pill { color: var(--text-dim); }
.dc-offline .status-dot  { background: var(--text-dim); }

/* badge strip (connectivity + blocked) */
.card-badges { display: flex; gap: .3rem; }

.badge {
  display: inline-flex;
  align-items: center;
  padding: .1rem .38rem;
  border-radius: 2px;
  font-size: .5rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  border: 1px solid transparent;
  line-height: 1.5;
}
.badge-blocked  { background: var(--red-bg);    color: var(--red);      border-color: var(--red-border); }
.badge-wlan24   { background: var(--blue-bg);   color: var(--blue);     border-color: var(--blue-border); }
.badge-wlan5    { background: var(--purple-bg); color: var(--purple);   border-color: var(--purple-border); }
.badge-wired    { background: transparent;      color: var(--text-dim); border-color: var(--border); }

/* name + vendor */
.device-name {
  font-size: .8125rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.01em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.3;
}
.dc-offline .device-name { color: var(--text-muted); }

.device-vendor {
  font-size: .625rem;
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: .04em;
  margin-top: -.2rem;
}

/* address line (MAC · IP) */
.card-addrs {
  display: flex;
  align-items: center;
  gap: .35rem;
  font-size: .5875rem;
  color: var(--text-dim);
  letter-spacing: .03em;
  overflow: hidden;
  margin-top: .1rem;
  border-top: 1px solid var(--border);
  padding-top: .4rem;
}
.card-addrs span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.addr-dot { flex-shrink: 0; color: var(--border-bright); }

/* RSSI signal bars */
.sig {
  display: inline-flex;
  align-items: flex-end;
  gap: 2px;
  margin-right: .25rem;
  vertical-align: middle;
  position: relative;
  top: -1px;
}
.sig-bar {
  width: 3px;
  border-radius: 1px;
  background: var(--border);
}
.sig-bar.lit { background: var(--green); }
.sig-bar:nth-child(1) { height: 4px; }
.sig-bar:nth-child(2) { height: 6px; }
.sig-bar:nth-child(3) { height: 8px; }
.sig-bar:nth-child(4) { height: 10px; }

/* card footer */
.card-footer {
  padding: .4rem .875rem;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

.redacted {
  filter: blur(2px);
  user-select: none;
}

/* empty state */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-dim);
  font-size: .625rem;
  letter-spacing: .2em;
  text-transform: uppercase;
}

@media (max-width: 640px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .device-grid { grid-template-columns: 1fr; }
  .search-input { width: 150px; }
}
</style>
</head>
<body>
<div id="loader"></div>
{{block "body" .}}{{end}}
</body>
</html>
{{end}}
